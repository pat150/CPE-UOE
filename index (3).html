<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pat Allen · English Language Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f5f0e8; --card:#fffdf8; --ink:#1a1a2e; --accent:#8b2fc9; --accent2:#e8a020; --muted:#6b6b7b; --border:#d4ccbc; --radius:12px; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:'Source Serif 4',serif;color:var(--ink);min-height:100vh}

  /* NAV */
  nav{background:var(--ink);padding:0 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.3);height:60px}
  .nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff;text-decoration:none;letter-spacing:.03em}
  .nav-logo span{color:var(--accent2)}
  .nav-links{display:flex;gap:24px;align-items:center}
  .nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;transition:color .2s}
  .nav-links a:hover{color:var(--accent2)}

  /* HERO */
  .hero{background:var(--ink);background-image:radial-gradient(ellipse at 15% 60%,rgba(139,47,201,.25) 0%,transparent 55%),radial-gradient(ellipse at 85% 30%,rgba(232,160,32,.15) 0%,transparent 50%);color:#fff;padding:80px 40px 100px;text-align:center;position:relative;overflow:hidden}
  .hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%)}
  .hero .badge{display:inline-block;background:rgba(139,47,201,.3);border:1px solid rgba(139,47,201,.5);color:#d4a8ff;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:5px 16px;border-radius:20px;margin-bottom:24px}
  .hero h1{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:800;line-height:1.15;margin-bottom:16px}
  .hero h1 em{font-style:normal;color:var(--accent2)}
  .hero p{font-size:1rem;color:rgba(255,255,255,.65);max-width:500px;margin:0 auto;line-height:1.7;font-style:italic}

  /* LAYOUT */
  .page{max-width:960px;margin:0 auto;padding:60px 24px 80px}

  /* LEVEL BLOCK */
  .level-block{margin-bottom:60px}
  .level-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid var(--border)}
  .level-badge{font-family:'Playfair Display',serif;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:20px;white-space:nowrap}
  .badge-cpe{background:var(--accent);color:#fff}
  .badge-cae{background:#1a6b4a;color:#fff}
  .badge-b2{background:#1a4a8b;color:#fff}
  .badge-gen{background:var(--accent2);color:#fff}
  .level-title{font-family:'Playfair Display',serif;font-size:1.5rem}
  .level-subtitle{font-size:.85rem;color:var(--muted);margin-top:2px;font-style:italic}

  /* SKILL GROUP */
  .skill-group{margin-bottom:24px}
  .skill-label{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-left:4px}
  .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}

  /* FILE CARD */
  .file-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-decoration:none;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.04);transition:transform .15s,box-shadow .15s,border-color .15s;animation:fadeUp .4s ease both}
  .file-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.09);border-color:var(--accent)}
  .fc-name{font-family:'Playfair Display',serif;font-size:.95rem;flex:1}
  .fc-arrow{font-size:1.1rem;color:var(--accent);flex-shrink:0;transition:transform .15s}
  .file-card:hover .fc-arrow{transform:translateX(3px)}

  /* EMPTY / LOADING */
  .empty-note{font-size:.82rem;color:var(--muted);font-style:italic;padding:14px 0 4px}
  .loading-wrap{padding:30px 0;text-align:center;color:var(--muted);font-style:italic;font-size:.9rem}
  .loading-dots::after{content:'';animation:dots 1.2s steps(3,end) infinite}
  @keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

  /* FOOTER */
  footer{background:var(--ink);color:rgba(255,255,255,.45);text-align:center;padding:32px 24px;font-size:.78rem;font-style:italic}
  footer strong{color:rgba(255,255,255,.7);font-style:normal}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:600px){.hero h1{font-size:2rem}nav{padding:0 16px}.nav-links{gap:12px}.file-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">Pat Allen · <span>English</span></a>
  <div class="nav-links">
    <a href="#cpe">CPE</a>
    <a href="#cae">CAE</a>
    <a href="#b2">B2</a>
    <a href="#gen">General</a>
  </div>
</nav>

<div class="hero">
  <div class="badge">English Language Learning</div>
  <h1>Resources for<br><em>Every Level</em></h1>
  <p>Practice materials, interactive tests and resources to help you reach your English language goals.</p>
</div>

<div class="page" id="main-content">
  <div class="loading-wrap"><span class="loading-dots">Loading resources</span></div>
</div>

<footer><strong>Pat Allen</strong> · English Language Resources · All levels welcome</footer>

<script>
const GITHUB_USER = 'pat150';
const GITHUB_REPO = 'CPE-UOE';

// ── Schema: levels and their skill sub-sections ──────────────
const SCHEMA = [
  {
    id: 'cpe', anchor: 'cpe',
    badge: 'C2 Proficiency', badgeClass: 'badge-cpe',
    title: 'Cambridge C2 Proficiency', subtitle: 'CPE · Use of English, Reading, Writing and more',
    prefix: 'cpe_',
    skills: [
      { key: 'test',    label: 'Practice Tests' },
      { key: 'reading', label: 'Reading' },
      { key: 'writing', label: 'Writing' },
      { key: 'grammar', label: 'Grammar' },
      { key: 'vocab',   label: 'Vocabulary' },
      { key: 'listen',  label: 'Listening' },
    ]
  },
  {
    id: 'cae', anchor: 'cae',
    badge: 'C1 Advanced', badgeClass: 'badge-cae',
    title: 'Cambridge C1 Advanced', subtitle: 'CAE · All papers and skills',
    prefix: 'cae_',
    skills: [
      { key: 'test',    label: 'Practice Tests' },
      { key: 'reading', label: 'Reading' },
      { key: 'writing', label: 'Writing' },
      { key: 'grammar', label: 'Grammar' },
      { key: 'vocab',   label: 'Vocabulary' },
      { key: 'listen',  label: 'Listening' },
    ]
  },
  {
    id: 'b2', anchor: 'b2',
    badge: 'B2 First', badgeClass: 'badge-b2',
    title: 'Cambridge B2 First', subtitle: 'FCE · All papers and skills',
    prefix: 'b2_',
    skills: [
      { key: 'test',    label: 'Practice Tests' },
      { key: 'reading', label: 'Reading' },
      { key: 'writing', label: 'Writing' },
      { key: 'grammar', label: 'Grammar' },
      { key: 'vocab',   label: 'Vocabulary' },
      { key: 'listen',  label: 'Listening' },
    ]
  },
  {
    id: 'gen', anchor: 'gen',
    badge: 'General English', badgeClass: 'badge-gen',
    title: 'General English', subtitle: 'Mixed levels · Grammar, vocabulary and skills practice',
    prefix: 'gen_',
    skills: [
      { key: 'grammar', label: 'Grammar' },
      { key: 'vocab',   label: 'Vocabulary' },
      { key: 'reading', label: 'Reading' },
      { key: 'writing', label: 'Writing' },
      { key: 'listen',  label: 'Listening' },
      { key: 'speak',   label: 'Speaking' },
    ]
  }
];

// ── Also catch legacy practice_test_ files under CPE ─────────
const LEGACY_CPE = /^practice_test_/i;

function formatName(filename) {
  return filename
    .replace(/\.html$/i, '')
    .replace(/^(cpe|cae|b2|fce|gen)_[a-z]+_/i, '')
    .replace(/^practice_test_/i, 'Practice Test ')
    .replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase())
    .replace(/\bCpe\b/g,'CPE').replace(/\bCae\b/g,'CAE').replace(/\bFce\b/g,'FCE')
    .trim();
}

function buildPage(files) {
  const container = document.getElementById('main-content');
  container.innerHTML = '';

  // Sort all files into buckets
  // bucket[levelId][skillKey] = [filename, ...]
  const buckets = {};
  SCHEMA.forEach(lv => { buckets[lv.id] = {}; lv.skills.forEach(sk => { buckets[lv.id][sk.key] = []; }); });

  files.forEach(f => {
    const name = f.name.toLowerCase();
    if (name === 'index.html') return;
    if (!name.endsWith('.html')) return;

    // Legacy CPE files
    if (LEGACY_CPE.test(f.name)) {
      buckets['cpe']['test'].push(f.name);
      return;
    }

    for (const lv of SCHEMA) {
      if (name.startsWith(lv.prefix)) {
        const rest = name.slice(lv.prefix.length);
        let matched = false;
        for (const sk of lv.skills) {
          if (rest.startsWith(sk.key + '_') || rest.startsWith(sk.key + '.')) {
            buckets[lv.id][sk.key].push(f.name);
            matched = true;
            break;
          }
        }
        if (!matched) {
          // No skill match — put in first skill bucket (tests)
          buckets[lv.id][lv.skills[0].key].push(f.name);
        }
        return;
      }
    }
  });

  // Render each level
  SCHEMA.forEach(lv => {
    const levelFiles = Object.values(buckets[lv.id]).flat();
    
    const block = document.createElement('div');
    block.className = 'level-block';
    block.id = lv.anchor;

    block.innerHTML =
      '<div class="level-header">' +
        '<span class="level-badge ' + lv.badgeClass + '">' + lv.badge + '</span>' +
        '<div><div class="level-title">' + lv.title + '</div>' +
        '<div class="level-subtitle">' + lv.subtitle + '</div></div>' +
      '</div>';

    let hasAny = false;
    lv.skills.forEach(sk => {
      const skFiles = buckets[lv.id][sk.key];
      if (skFiles.length === 0) return;
      hasAny = true;

      const group = document.createElement('div');
      group.className = 'skill-group';
      group.innerHTML = '<div class="skill-label">' + sk.label + '</div>';

      const grid = document.createElement('div');
      grid.className = 'file-grid';

      skFiles.sort().forEach(function(fname, i) {
        const card = document.createElement('a');
        card.className = 'file-card';
        card.href = fname;
        card.style.animationDelay = (i * 0.05) + 's';
        card.innerHTML =
          '<div class="fc-name">' + formatName(fname) + '</div>' +
          '<div class="fc-arrow">\u2192</div>';
        grid.appendChild(card);
      });

      group.appendChild(grid);
      block.appendChild(group);
    });

    if (!hasAny) {
      block.innerHTML += '<div class="empty-note">No materials uploaded yet \u2014 check back soon.</div>';
    }

    container.appendChild(block);
  });
}

async function loadFiles() {
  const container = document.getElementById('main-content');
  try {
    const res = await fetch(
      'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/',
      { headers: { 'Accept': 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) throw new Error('API error ' + res.status);
    const files = await res.json();
    buildPage(files);
  } catch(err) {
    // Fallback
    buildPage([
      {name:'practice_test_1.html'},{name:'practice_test_2.html'},
      {name:'practice_test_3.html'},{name:'practice_test_10.html'},
      {name:'practice_test_13.html'}
    ]);
  }
}

loadFiles();
</script>
</body>
</html>
